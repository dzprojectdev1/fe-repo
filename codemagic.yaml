workflows:
  android-debug-build:
    name: Android Debug Build
    environment:
      node: 12.22.12
      java: 11
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps --ignore-scripts
      - name: Fix gradle files
        script: |
          # Fix react-native-fast-image
          FAST_IMAGE="node_modules/react-native-fast-image/android/build.gradle"
          if [ -f "$FAST_IMAGE" ]; then
            sed -i '' 's/com.android.tools.build:gradle:2.3.3/com.android.tools.build:gradle:3.5.3/g' $FAST_IMAGE
            sed -i '' 's/jcenter()/mavenCentral()\n        google()/g' $FAST_IMAGE
          fi
          # Fix react-native-wheel-picker
          WHEEL_PICKER="node_modules/react-native-wheel-picker/android/build.gradle"
          if [ -f "$WHEEL_PICKER" ]; then
            sed -i '' '/cn.aigestudio.wheelpicker/d' $WHEEL_PICKER
          fi
          # Find and fix all exoplayer references
          echo "=== Searching for exoplayer references ==="
          grep -r "exoplayer:2.9.3" node_modules --include="*.gradle" -l
          find node_modules -name "*.gradle" | xargs grep -l "exoplayer" 2>/dev/null
          # Fix all found files
          find node_modules -name "*.gradle" -exec grep -l "exoplayer:2.9.3" {} \; | while read f; do
            echo "Fixing $f"
            sed -i '' 's/exoplayer:2.9.3/exoplayer:2.11.8/g' "$f"
            sed -i '' 's/extension-okhttp:2.9.3/extension-okhttp:2.11.8/g' "$f"
          done
      - name: Build Android Debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
