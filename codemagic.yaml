workflows:
  android-debug-build:
    name: Android Debug Build
    max_build_duration: 120
    instance_type: mac_mini_m2   # matches your current build
    environment:
      ndk: r21d                  # Key line: forces NDK r21 (has arm-linux-androideabi-4.9 toolchain)
      groups:
        - google-services        # if you have encrypted vars for google-services.json etc.
    scripts:
      - cd $CM_BUILD_DIR/android && ./gradlew assembleDebug --stacktrace
