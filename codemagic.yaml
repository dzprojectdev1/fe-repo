workflows:
  android-debug-build:
    name: Android Debug Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ndk: r21d                  # This installs NDK r21d (compatible with old toolchains)
      # Add other env if needed, e.g.:
      # groups:
      #   - your-group-name
    scripts:
      - cd $CM_BUILD_DIR/android && ./gradlew assembleDebug --stacktrace
