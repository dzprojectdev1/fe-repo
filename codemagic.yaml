workflows:
  android-debug-build:
    name: Android Debug Build
    environment:
      node: 12.22.12
      java: 11
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps --ignore-scripts
      - name: Fix react-native-fast-image gradle
        script: |
          FAST_IMAGE="node_modules/react-native-fast-image/android/build.gradle"
          if [ -f "$FAST_IMAGE" ]; then
            sed -i 's/jcenter()/mavenCentral()/g' $FAST_IMAGE
            sed -i 's/com.android.tools.build:gradle:2.3.3/com.android.tools.build:gradle:3.5.3/g' $FAST_IMAGE
          fi
      - name: Build Android Debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
